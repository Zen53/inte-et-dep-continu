name: Build and Test React Application

on:
  push:
    branches: [master]

jobs:
  # ──────────────────────────────────────────────
  # Job 1 : Build, Test & Coverage
  # ──────────────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: cd app && pnpm install --no-frozen-lockfile

      - name: Install Cypress binary
        run: cd app && pnpm exec cypress install

      - name: Generate JSDoc
        run: cd app && pnpm run doc

      - name: Build React App
        run: cd app && pnpm run build

      - name: Run Tests
        run: cd app && pnpm test

      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: app
          start: pnpm dev
          wait-on: 'http://localhost:5173/Test_cycle_TDD/'

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: app/coverage/lcov.info
          fail_ci_if_error: 'true'

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./app/dist

  # ──────────────────────────────────────────────
  # Job 2 : Publish to NPM (with SemVer bypass)
  # ──────────────────────────────────────────────
  publish-npm:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: https://registry.npmjs.org/

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: cd app && pnpm install --no-frozen-lockfile

      - name: Check if publish is needed (SemVer bypass)
        id: version-check
        run: |
          cd app
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          echo "Local version: $LOCAL_VERSION"
          echo "Package name: $PACKAGE_NAME"

          # Try to get the published version from NPM
          PUBLISHED_VERSION=$(npm view "$PACKAGE_NAME" version 2>/dev/null || echo "0.0.0")
          echo "Published version: $PUBLISHED_VERSION"

          # Compare versions using node semver logic
          SHOULD_PUBLISH=$(node -e "
            const local = '$LOCAL_VERSION';
            const published = '$PUBLISHED_VERSION';
            const [lMajor, lMinor, lPatch] = local.split('.').map(Number);
            const [pMajor, pMinor, pPatch] = published.split('.').map(Number);
            const isNewer = lMajor > pMajor || 
              (lMajor === pMajor && lMinor > pMinor) || 
              (lMajor === pMajor && lMinor === pMinor && lPatch > pPatch);
            console.log(isNewer ? 'true' : 'false');
          ")

          echo "Should publish: $SHOULD_PUBLISH"
          echo "should_publish=$SHOULD_PUBLISH" >> $GITHUB_OUTPUT
          echo "local_version=$LOCAL_VERSION" >> $GITHUB_OUTPUT
          echo "published_version=$PUBLISHED_VERSION" >> $GITHUB_OUTPUT

      - name: Build NPM package
        if: steps.version-check.outputs.should_publish == 'true'
        run: cd app && pnpm run build-npm-ci

      - name: Setup NPM authentication
        if: steps.version-check.outputs.should_publish == 'true'
        run: echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to NPM
        if: steps.version-check.outputs.should_publish == 'true'
        run: |
          cd app
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip publish (version unchanged)
        if: steps.version-check.outputs.should_publish != 'true'
        run: |
          echo "⏭️ Publication skipped: local version (${{ steps.version-check.outputs.local_version }}) is not newer than published version (${{ steps.version-check.outputs.published_version }})"

  # ──────────────────────────────────────────────
  # Job 3 : Integration Test & Docker Hub Push
  # ──────────────────────────────────────────────
  integration-test:
    needs: publish-npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build MySQL image
        run: docker build -t migration_mysql -f Dockerfile .

      - name: Build API image
        run: docker build -t api-python -f api/Dockerfile api/

      - name: Create Docker network
        run: docker network create test-network

      - name: Start MySQL container
        run: |
          docker run -d \
            --name test-mysql \
            --network test-network \
            -e MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }} \
            migration_mysql

      - name: Wait for MySQL to be ready
        run: |
          echo "Waiting for MySQL to initialize..."
          for i in $(seq 1 30); do
            if docker exec test-mysql mysqladmin ping -h localhost -u root -p${{ secrets.MYSQL_ROOT_PASSWORD }} --silent 2>/dev/null; then
              echo "MySQL is ready!"
              break
            fi
            echo "Attempt $i/30 - MySQL not ready yet..."
            sleep 3
          done

      - name: Start API container
        run: |
          docker run -d \
            --name test-api \
            --network test-network \
            -p 8000:8000 \
            -e MYSQL_HOST=test-mysql \
            -e MYSQL_USER=root \
            -e MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }} \
            -e MYSQL_DATABASE=ynov_ci \
            api-python

      - name: Wait for API to be ready
        run: sleep 5

      - name: Test API endpoint /users
        run: |
          RESPONSE=$(curl -s -o /tmp/response.json -w "%{http_code}" http://localhost:8000/users)
          echo "HTTP Status: $RESPONSE"
          echo "Response body:"
          cat /tmp/response.json

          # Check HTTP 200
          if [ "$RESPONSE" != "200" ]; then
            echo "❌ API returned status $RESPONSE instead of 200"
            exit 1
          fi

          # Check that users list is not empty
          USER_COUNT=$(python3 -c "import json; data=json.load(open('/tmp/response.json')); print(len(data.get('utilisateurs', [])))")
          echo "Number of users: $USER_COUNT"
          if [ "$USER_COUNT" -eq 0 ]; then
            echo "❌ Users list is empty"
            exit 1
          fi

          echo "✅ Integration test passed: $USER_COUNT user(s) found"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and Push API image to Docker Hub
        run: |
          docker tag api-python ${{ secrets.DOCKERHUB_USERNAME }}/ynov-ci-api:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ynov-ci-api:latest

      - name: Cleanup containers
        if: always()
        run: |
          docker stop test-api test-mysql 2>/dev/null || true
          docker rm test-api test-mysql 2>/dev/null || true
          docker network rm test-network 2>/dev/null || true

  # ──────────────────────────────────────────────
  # Job 4 : Deploy to GitHub Pages
  # ──────────────────────────────────────────────
  deploy:
    needs: integration-test
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{steps.deployment.outputs.page_url}}
    steps:
      - name: Deploy to Github pages
        id: deployment
        uses: actions/deploy-pages@v4