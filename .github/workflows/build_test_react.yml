name: Build and Test React Application

on:
  push:
    branches: [master]

jobs:
  # ──────────────────────────────────────────────
  # Job 1 : Build, Test & Coverage
  # ──────────────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: cd app && pnpm install --no-frozen-lockfile

      - name: Install Cypress binary
        run: cd app && pnpm exec cypress install

      - name: Generate JSDoc
        run: cd app && pnpm run doc

      - name: Build React App
        run: cd app && pnpm run build

      - name: Run Tests
        run: cd app && pnpm test

      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: app
          start: pnpm dev
          wait-on: 'http://localhost:5173/Test_cycle_TDD/'

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: app/coverage/lcov.info
          fail_ci_if_error: 'true'

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./app/dist

  # ──────────────────────────────────────────────
  # Job 2 : Publish to NPM (with SemVer bypass)
  # ──────────────────────────────────────────────
  publish-npm:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: https://registry.npmjs.org/

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: cd app && pnpm install --no-frozen-lockfile

      - name: Check if publish is needed (SemVer bypass)
        id: version-check
        run: |
          cd app
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          echo "Local version: $LOCAL_VERSION"
          echo "Package name: $PACKAGE_NAME"

          # Try to get the published version from NPM
          PUBLISHED_VERSION=$(npm view "$PACKAGE_NAME" version 2>/dev/null || echo "0.0.0")
          echo "Published version: $PUBLISHED_VERSION"

          # Compare versions using node semver logic
          SHOULD_PUBLISH=$(node -e "
            const local = '$LOCAL_VERSION';
            const published = '$PUBLISHED_VERSION';
            const [lMajor, lMinor, lPatch] = local.split('.').map(Number);
            const [pMajor, pMinor, pPatch] = published.split('.').map(Number);
            const isNewer = lMajor > pMajor || 
              (lMajor === pMajor && lMinor > pMinor) || 
              (lMajor === pMajor && lMinor === pMinor && lPatch > pPatch);
            console.log(isNewer ? 'true' : 'false');
          ")

          echo "Should publish: $SHOULD_PUBLISH"
          echo "should_publish=$SHOULD_PUBLISH" >> $GITHUB_OUTPUT
          echo "local_version=$LOCAL_VERSION" >> $GITHUB_OUTPUT
          echo "published_version=$PUBLISHED_VERSION" >> $GITHUB_OUTPUT

      - name: Build NPM package
        if: steps.version-check.outputs.should_publish == 'true'
        run: cd app && pnpm run build-npm-ci

      - name: Setup NPM authentication
        if: steps.version-check.outputs.should_publish == 'true'
        run: echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to NPM
        if: steps.version-check.outputs.should_publish == 'true'
        run: |
          cd app
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip publish (version unchanged)
        if: steps.version-check.outputs.should_publish != 'true'
        run: |
          echo "⏭️ Publication skipped: local version (${{ steps.version-check.outputs.local_version }}) is not newer than published version (${{ steps.version-check.outputs.published_version }})"

  # ──────────────────────────────────────────────
  # Job 3 : Deploy to GitHub Pages
  # ──────────────────────────────────────────────
  deploy:
    needs: publish-npm
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{steps.deployment.outputs.page_url}}
    steps:
      - name: Deploy to Github pages
        id: deployment
        uses: actions/deploy-pages@v4